<!-- conceptual-map.component.html — Paso 5 -->
<!--
  El SVG se construye 100% dinámico con @for.
  Tres pasadas:
    1. @for paths   → dibuja líneas y curvas (detrás)
    2. @for joints  → dibuja círculos interactivos (encima de paths)
    3. @for nodes   → dibuja nodos con foreignObject (encima de todo)
-->

<section class="relative overflow-hidden rounded-xl border border-gray-200 bg-white p-4">

  <!-- Header + controles de zoom -->
  <div class="mb-3 flex items-center justify-between">

    <h2 class="text-sm font-medium text-gray-900">Mapa Conceptual</h2>

    <div class="flex items-center gap-1.5">
      <button
        class="flex h-7 w-7 items-center justify-center rounded-lg border border-gray-200
               bg-white text-gray-400 transition hover:border-gray-300 hover:text-gray-700"
        (click)="resetCanvas()" title="Restablecer vista">
        <i class="ti ti-home text-[13px]"></i>
      </button>
      <div class="h-4 w-px bg-gray-200"></div>
      <button
        class="flex h-7 w-7 items-center justify-center rounded-lg border border-gray-200
               bg-white text-gray-400 transition hover:border-gray-300 hover:text-gray-700
               disabled:cursor-not-allowed disabled:opacity-40"
        (click)="zoomOut()" [disabled]="zoom() <= 0.3">
        <i class="ti ti-minus text-[13px]"></i>
      </button>
      <span class="min-w-[38px] text-center text-[11px] font-medium text-gray-500">
        {{ (zoom() * 100).toFixed(0) }}%
      </span>
      <button
        class="flex h-7 w-7 items-center justify-center rounded-lg border border-gray-200
               bg-white text-gray-400 transition hover:border-gray-300 hover:text-gray-700
               disabled:cursor-not-allowed disabled:opacity-40"
        (click)="zoomIn()" [disabled]="zoom() >= 2">
        <i class="ti ti-plus text-[13px]"></i>
      </button>
    </div>

  </div>

  <!-- Canvas -->
  <div
    #canvasRef
    class="relative h-[400px] overflow-hidden rounded-lg bg-slate-50 select-none"
    [class.cursor-grab]="!isDragging()"
    [class.cursor-grabbing]="isDragging()"
    (mousedown)="onMouseDown($event)"
    (mousemove)="onMouseMove($event)"
    (mouseup)="onMouseUp()"
    (mouseleave)="onMouseUp()"
    (wheel)="onWheel($event)">

    <div class="absolute inset-0 origin-top-left" [style.transform]="mapTransform()">

      <!--
        SVG DINÁMICO
        width y height se calculan en buildLayout() según el contenido
        Cambia de tamaño automáticamente cuando se expanden/colapsan nodos
      -->
      <svg
        [attr.width]="layout().svgWidth"
        [attr.height]="layout().svgHeight"
        xmlns="http://www.w3.org/2000/svg">

        <!-- ══════════════════════════════════════════════════════════════
             PASADA 1: PATHS
             Se renderizan primero → quedan detrás de joints y nodos.
             El algoritmo ya los ordenó correctamente (far primero).
        ══════════════════════════════════════════════════════════════ -->
        @for (path of layout().paths; track $index) {
          <path
            [attr.d]="path.d"
            [style.stroke]="path.color"
            [attr.stroke-dasharray]="path.dashed ? '0,5' : null"
            style="fill:transparent;stroke-width:4;stroke-linecap:round;"/>
        }

        <!-- ══════════════════════════════════════════════════════════════
             PASADA 2: JOINTS
             Círculos interactivos.
             Patrón por joint: outer (visible) + inner (estado) + transparent (click)
        ══════════════════════════════════════════════════════════════ -->
        @for (joint of layout().joints; track joint.nodeId) {

          <!-- Anillo exterior (siempre visible) -->
          <circle
            [attr.cx]="joint.cx"
            [attr.cy]="joint.cy"
            [attr.r]="joint.radius"
            fill="white"
            [style.stroke]="joint.color"
            stroke-width="3"/>

          <!-- Punto interior (indica estado: filled=colapsado, vacío=expandido) -->
          <circle
            [attr.cx]="joint.cx"
            [attr.cy]="joint.cy"
            [attr.r]="joint.radius * 0.4"
            [attr.fill]="isExpanded(joint.nodeId) ? 'white' : joint.color"/>

          <!-- Área transparente de click (más grande que el círculo visible) -->
          <circle
            [attr.cx]="joint.cx"
            [attr.cy]="joint.cy"
            [attr.r]="joint.radius + 3"
            fill="transparent"
            class="cursor-pointer"
            (click)="toggleNode(joint.nodeId)"/>

        }

        <!-- ══════════════════════════════════════════════════════════════
             PASADA 3: NODOS con foreignObject
             x, y, width, height vienen del layout calculado.
             El contenido HTML se adapta según node.level.
        ══════════════════════════════════════════════════════════════ -->
        @for (node of layout().nodes; track node.id) {

          <foreignObject
            [attr.x]="node.x"
            [attr.y]="node.y"
            [attr.width]="node.width"
            [attr.height]="node.height">

            <div xmlns="http://www.w3.org/1999/xhtml" [style]="getNodeStyle(node)">

              <!-- Dot de estado (solo units L3) -->
              @if (node.level === 3) {
                <span
                  [style.background]="getStatusDot(node.status)"
                  style="width:6px;height:6px;border-radius:50%;flex-shrink:0;
                         display:inline-block;margin-right:6px;">
                </span>
              }

              <!-- Texto del nodo -->
              <span [style]="getTextStyle(node)">{{ node.label }}</span>

            </div>

          </foreignObject>

        }

      </svg>

    </div>

  </div>

  <p class="mt-2 text-[10px] text-gray-300">
    Arrastra para mover · Ctrl+scroll para zoom
  </p>

</section>
