<main class="min-h-screen bg-slate-100 text-slate-800">

  <!-- Layout Container -->
  <div class="mx-auto w-full max-w-[1800px] px-4 py-6 sm:px-6 lg:px-8 xl:px-10">

    <!-- Floating Dashboard Card -->
    <div
      class="rounded-[32px] border border-slate-200 bg-white p-4 shadow-xl sm:p-6 lg:p-8">

      <!-- Header -->
      <header class="mb-8 flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">

        <!-- Title -->
        <div>

          <h1 class="text-3xl font-bold tracking-tight sm:text-4xl">
            AZURE AZ-900
          </h1>

          <p class="mt-2 text-slate-500">
            Dashboard interactivo de aprendizaje
          </p>

        </div>

        <!-- Progress Card -->
        <div
          class="min-w-32 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-center shadow-sm">

          <p class="text-sm text-slate-500">
            Overall Progress
          </p>

          <p class="text-2xl font-bold text-slate-800">
            55%
          </p>

        </div>

      </header>

      <!-- Main Content -->
      <section class="flex flex-col gap-6 lg:flex-row">

        <!-- Roadmap Section -->
        <section
          class="relative flex-1 overflow-hidden rounded-3xl border border-slate-200 bg-white p-6">

          <!-- Roadmap Header -->
          <div class="mb-6 flex items-center justify-between">

            <h2 class="text-2xl font-semibold">
              Interactive Roadmap
            </h2>

            <span class="text-sm text-slate-500">
              SVG roadmap
            </span>

          </div>

          <!-- Roadmap Canvas -->
          <div
            class="relative min-h-[780px] overflow-auto rounded-3xl bg-slate-50">

            <!-- SVG Background -->
            <svg
              class="absolute inset-0 h-full w-full"
              viewBox="0 0 900 780"
              fill="none">

              <!-- Main Spine -->
              <path
                d="M120 70 L120 700"
                stroke="url(#roadGradient)"
                stroke-width="6"
                stroke-linecap="round" />

              <!-- Branches -->
              <path
                d="M120 140 Q120 190 160 190 L220 190"
                stroke="#3B82F6"
                stroke-width="5"
                stroke-linecap="round" />

              <path
                d="M120 500 Q120 540 160 540 L220 540"
                stroke="#A855F7"
                stroke-width="5"
                stroke-linecap="round" />

              <path
                d="M120 650 Q120 690 160 690 L220 690"
                stroke="#EC4899"
                stroke-width="5"
                stroke-linecap="round" />

              <!-- Subtree -->
              <path
                d="M290 190 L290 410 Q290 430 320 430 L360 430"
                stroke="#3B82F6"
                stroke-width="4"
                stroke-linecap="round" />

              <path
                d="M360 430 L360 500 Q360 520 390 520 L430 520"
                stroke="#3B82F6"
                stroke-width="4"
                stroke-dasharray="8 8"
                stroke-linecap="round" />

              <!-- Joints -->
              <circle
                cx="170"
                cy="240"
                r="12"
                fill="#F8FAFC"
                stroke="#3B82F6"
                stroke-width="4" />

              <circle
                cx="300"
                cy="470"
                r="12"
                fill="#F8FAFC"
                stroke="#3B82F6"
                stroke-width="4" />

              <circle
                cx="120"
                cy="590"
                r="12"
                fill="#F8FAFC"
                stroke="#A855F7"
                stroke-width="4" />

              <circle
                cx="120"
                cy="740"
                r="12"
                fill="#F8FAFC"
                stroke="#EC4899"
                stroke-width="4" />

              <!-- Gradient -->
              <defs>

                <linearGradient
                  id="roadGradient"
                  x1="0"
                  y1="0"
                  x2="0"
                  y2="1">

                  <stop offset="0%" stop-color="#3B82F6"></stop>

                  <stop offset="55%" stop-color="#A855F7"></stop>

                  <stop offset="100%" stop-color="#EC4899"></stop>

                </linearGradient>

              </defs>

            </svg>

            <!-- Main Node -->
            <div class="absolute left-24 top-12">

              <div
                class="rounded-3xl border-4 border-sky-500 bg-white px-8 py-6 shadow-sm">

                <h2
                  class="text-5xl font-bold tracking-tight text-slate-700">

                  AZURE AZ-900

                </h2>

              </div>

            </div>

            <!-- Node 1 -->
            <div class="group absolute left-44 top-40">

              <button
                class="w-80 rounded-3xl bg-blue-500 px-6 py-5 text-left text-white shadow-md transition duration-300 hover:scale-105"
                (click)="toggleNode(roadmap[0])">

                <div class="flex items-center justify-between">

                  <div>

                    <h3 class="text-2xl font-semibold">
                      {{ roadmap[0].label }}
                    </h3>

                    <p class="mt-1 text-sm text-blue-100">
                      {{ roadmap[0].type }}
                    </p>

                  </div>

                  <span
                    class="text-lg transition duration-300"
                    [class.rotate-180]="roadmap[0].expanded">

                    ▼

                  </span>

                </div>

              </button>

            </div>

            <!-- Azure Policy -->
            <div
              *ngIf="roadmap[0].expanded"
              class="absolute left-60 top-72">

              <div
                class="w-72 rounded-3xl border-4 border-blue-500 bg-white px-6 py-5 shadow-sm transition duration-300 hover:scale-105">

                <h3 class="text-2xl font-semibold text-slate-700">
                  {{ roadmap[0].children?.[0]?.label }}
                </h3>

              </div>

            </div>

            <!-- Iniciativas -->
            <div
              *ngIf="roadmap[0].expanded"
              class="absolute left-96 top-[450px]">

              <div
                class="w-56 rounded-3xl border-4 border-dotted border-blue-500 bg-white px-6 py-5 shadow-sm transition duration-300 hover:scale-105">

                <h3 class="text-2xl font-semibold text-slate-700">
                  Iniciativas
                </h3>

              </div>

            </div>

            <!-- Cost -->
            <div
              *ngIf="roadmap[0].expanded"
              class="absolute left-60 top-[540px]">

              <div
                class="w-80 rounded-3xl border-4 border-blue-500 bg-white px-6 py-5 shadow-sm transition duration-300 hover:scale-105">

                <h3 class="text-2xl font-semibold text-slate-700">
                  {{ roadmap[0].children?.[1]?.label }}
                </h3>

              </div>

            </div>

            <!-- Node 2 -->
            <div class="absolute left-44 top-[610px]">

              <button
                class="w-96 rounded-3xl bg-violet-400 px-6 py-5 text-left text-white shadow-md transition duration-300 hover:scale-105"
                (click)="toggleNode(roadmap[1])">

                <div class="flex items-center justify-between">

                  <h3 class="text-2xl font-semibold">
                    {{ roadmap[1].label }}
                  </h3>

                  <span>
                    ▼
                  </span>

                </div>

              </button>

            </div>

            <!-- Node 3 -->
            <div class="absolute left-44 top-[720px]">

              <button
                class="w-96 rounded-3xl bg-pink-500 px-6 py-5 text-left text-white shadow-md transition duration-300 hover:scale-105"
                (click)="toggleNode(roadmap[2])">

                <div class="flex items-center justify-between">

                  <h3 class="text-2xl font-semibold">
                    {{ roadmap[2].label }}
                  </h3>

                  <span>
                    ▼
                  </span>

                </div>

              </button>

            </div>

          </div>

        </section>

        <!-- Sidebar -->
        <aside
          class="flex w-full flex-col rounded-3xl border border-slate-200 bg-white p-6 shadow-sm lg:w-96">

          <h2 class="mb-6 text-2xl font-semibold text-slate-800">
            Topic Details
          </h2>

          <div class="space-y-5">

            <!-- Selected Topic -->
            <div>

              <p class="mb-1 text-sm text-slate-500">
                Selected Topic
              </p>

              <h3 class="text-xl font-bold text-slate-800">
                {{ roadmap[0].label }}
              </h3>

            </div>

            <!-- Progress -->
            <div>

              <p class="mb-2 text-sm text-slate-500">
                Progress
              </p>

              <div
                class="h-3 w-full overflow-hidden rounded-full bg-slate-200">

                <div
                  class="h-full w-3/5 rounded-full bg-yellow-400">

                </div>

              </div>

              <p class="mt-2 text-sm text-slate-500">
                60% completed
              </p>

            </div>

          </div>

        </aside>

      </section>

    </div>

  </div>

</main>
